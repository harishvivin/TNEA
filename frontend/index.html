<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNEA Smart College Predictor</title>
  <!-- Modern Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Phosphor Icons CDN for stunning UI icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- jsPDF and AutoTable for native PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <!-- Header Section -->
    <header class="fade-in-down">
      <h1>
        <img src="tnea_logo.png" alt="TNEA Logo" class="app-logo">
        <span class="gradient-text">TNEA College Finder</span>
      </h1>
      <p class="subtitle">Discover the best engineering colleges in Tamil Nadu based on your cutoff marks. Experience
        seamless college selection.</p>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Search Form -->
      <div class="form-container fade-in-up">
        <form id="search-form" class="glass-panel">
          <div class="form-grid">

            <!-- Cutoff Input -->
            <div class="input-group">
              <label for="cutoff" class="input-label">
                <i class="ph ph-medal"></i> Your Cutoff Mark
              </label>
              <input type="number" id="cutoff" class="input-field" placeholder="e.g., 185" step="0.1" min="0" max="200"
                required>
            </div>

            <!-- District Dropdown -->
            <div class="input-group">
              <label for="district" class="input-label">
                <i class="ph ph-map-pin"></i> District Preference
              </label>
              <select id="district" class="input-field">
                <option value="All">All Districts</option>
                <!-- JS will populate this -->
              </select>
            </div>

            <!-- College Type Dropdown -->
            <div class="input-group">
              <label for="type" class="input-label">
                <i class="ph ph-buildings"></i> College Type
              </label>
              <select id="type" class="input-field">
                <option value="All">All Types</option>
                <option value="Autonomous">Autonomous</option>
                <option value="Non-Autonomous">Non-Autonomous</option>
              </select>
            </div>

          </div>

          <div class="submit-container">
            <button type="submit" id="submit-btn" class="btn-primary">
              <i class="ph-bold ph-magnifying-glass"></i>
              <span>Predict Colleges</span>
            </button>
          </div>
        </form>
      </div>

      <!-- Results Section -->
      <div class="results-container">
        <div id="results-header" class="hidden fade-in" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <h3 id="result-count" style="margin-bottom: 0;">Found 0 Colleges</h3>
          <button id="download-btn" class="btn-secondary hidden" title="Download Report">
            <i class="ph-bold ph-download-simple"></i> Download PDF
          </button>
        </div>

        <div id="college-grid" class="college-grid">
          <!-- Cards will be injected here via JS -->
        </div>

        <div id="empty-state" class="empty-state hidden fade-in">
          <i class="ph-duotone ph-ghost empty-icon"></i>
          <h3>No colleges found matching your criteria.</h3>
          <p>Try lowering your cutoff or expanding your search to 'All Districts'.</p>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="loading-grid hidden">
          <div class="glass-panel pulse-skeleton"></div>
          <div class="glass-panel pulse-skeleton"></div>
          <div class="glass-panel pulse-skeleton"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Vanilla Javascript Logic -->
  <script src="script.js"></script>
</body>

</html>
